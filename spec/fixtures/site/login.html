<!doctype html>
<html>
<head><title>Fixture Login</title></head>
<body>
<h1>Login</h1>
<form id="login-form">
  <label>Email <input id="email" name="email" type="text"></label>
  <label>Password <input id="password" name="password" type="password"></label>
  <button id="login-btn" type="submit">Log in</button>
</form>
<script>
// The welcome element is inserted into the DOM asynchronously (not un-hidden) so
// replayed waits must survive NoSuchElementError polls, like real dynamic apps.
document.getElementById("login-form").addEventListener("submit", function (e) {
  e.preventDefault();
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;
  if (email && password) {
    setTimeout(function () {
      var div = document.createElement("div");
      div.className = "welcome";
      div.textContent = "Welcome back";
      document.body.appendChild(div);
    }, 300);
  }
});
</script>
</body>
</html>
