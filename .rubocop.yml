plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - "spec/fixtures/**/*"
    - "vendor/**/*"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Layout/LineLength:
  Exclude:
    - "*.gemspec"

Metrics/MethodLength:
  Max: 25

Metrics/AbcSize:
  Max: 25

Metrics/ClassLength:
  Max: 150

RSpec/ExampleLength:
  Max: 25
  Exclude:
    - "spec/integration/**/*"

RSpec/MultipleExpectations:
  Max: 6
  Exclude:
    - "spec/integration/**/*"

RSpec/DescribeClass:
  Exclude:
    - "spec/spec_ai/tools/**/*"
    - "spec/integration/**/*"

RSpec/SpecFilePathFormat:
  Exclude:
    - "spec/integration/**/*"
